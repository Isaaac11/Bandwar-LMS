{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-7">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-warning py-3">
                <h4 class="mb-0 text-center">
                    <i class="bi bi-person-gear me-2"></i>Editar Mi Perfil ({% if user.rol == 'profesor' %}Profesor{% else %}Estudiante{% endif %})
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <h6 class="text-primary border-bottom pb-2 mb-3">Datos Personales</h6>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" name="nombre" class="form-control" value="{{ user.first_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Apellido</label>
                            <input type="text" name="apellido" class="form-control" value="{{ user.last_name }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">ID de Usuario (No editable)</label>
                        <input type="text" class="form-control bg-light" value="{{ user.username }}" disabled>
                    </div>

                    {% if user.rol == 'estudiante' %}
                    <h6 class="text-primary border-bottom pb-2 mb-3 mt-4">Datos de la UNEFA</h6>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label fw-bold">Carrera</label>
                            <select name="carrera" class="form-select" required>
                                <option value="Ing. de Sistemas" {% if user.carrera == "Ing. de Sistemas" %}selected{% endif %}>Ing. de Sistemas</option>
                                <option value="Ing. Petroquimica" {% if user.carrera == "Ing. Petroquimica" %}selected{% endif %}>Ing. Petroquimica</option>
                                <option value="Ing. Telecomunicaciones" {% if user.carrera == "Ing. Telecomunicaciones" %}selected{% endif %}>Ing. Telecomunicaciones</option>
                                <option value="Turismo" {% if user.carrera == "Turismo" %}selected{% endif %}>Turismo</option>
                                <option value="Administración de Desastres" {% if user.carrera == "Administración de Desastres" %}selected{% endif %}>Administración de Desastres</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Semestre</label>
                            <select name="semestre" class="form-select" required>
                                <option value="0" {% if user.semestre == 0 %}selected{% endif %}>CINU</option>
                                {% for i in "12345678" %}
                                    <option value="{{ i }}" {% if user.semestre|stringformat:"i" == i %}selected{% endif %}>{{ i }}º Semestre</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Rango Militar</label>
                        <select name="rango_militar" class="form-select" required>
                            <option value="No poseo" {% if user.rango_militar == "No poseo" %}selected{% endif %}>No poseo</option>
                            <option value="Miliciano" {% if user.rango_militar == "Miliciano" %}selected{% endif %}>Miliciano</option>
                            <option value="Distinguido" {% if user.rango_militar == "Distinguido" %}selected{% endif %}>Distinguido</option>
                            <option value="Sargento" {% if user.rango_militar == "Sargento" %}selected{% endif %}>Sargento</option>
                            </select>
                    </div>

                    <h6 class="text-danger border-bottom pb-2 mb-3 mt-4">Seguridad</h6>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Nueva Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Dejar en blanco para no cambiar">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Guardar Cambios</button>
                        <a href="{% url 'banda_usuarios:home' %}" class="btn btn-light border">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
