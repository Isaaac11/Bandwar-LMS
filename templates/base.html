{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    ...
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'banda_usuarios:home' %}">BANDWAR</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="nav-link text-light">Hola, {{ user.username }}</span>
                    <a class="btn btn-sm btn-outline-danger ms-2" href="{% url 'banda_usuarios:logout' %}">Cerrar Sesión</a>
                    {% else %}
                    <a class="nav-link" href="{% url 'banda_usuarios:login' %}">Iniciar Sesión</a>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'banda_usuarios:dashboard_profesor' %}">Panel de Control</a>
                    </li>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
